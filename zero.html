<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZKP 内部通報デモシステム</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #1e3a8a;
        }
        .container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h2 {
            border-bottom: 2px solid #3b82f6;
            padding-bottom: 8px;
            color: #1e40af;
            font-size: 1.2rem;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .success {
            background-color: #ecfdf5;
            border: 2px solid #10b981;
            color: #065f46;
        }
        .danger {
            background-color: #fef2f2;
            border: 2px solid #ef4444;
            color: #991b1b;
        }
        .status-box {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            display: none;
        }
        .console {
            background-color: #111827;
            color: #10b981;
            font-family: monospace;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 0.85rem;
            max-height: 120px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <h1>内部通報シミュレーター</h1>
   
    <div class="container">
        <!-- 1. 告発者側の画面 -->
        <div class="card">
            <h2>① 告発者（あなた）のブラウザ</h2>
            
            <label for="id">あなたの社員ID (秘密情報)</label>
            <input type="password" id="id" value="ID_26P5009">
            
            <label for="key">あなたの秘密鍵 (秘密情報)</label>
            <input type="password" id="key" value="yoyo66ak">

            <label for="report">告発内容</label>
            <textarea id="report" rows="3">不適切な会計処理が行われている疑いがあります。</textarea>

            <button onclick="generateProofAndSend()"> 証明書を生成して送信</button>
            
            <label>ローカル実行ログ:</label>
            <div id="sender-console" class="console">待機中...</div>
        </div>

        <!-- 2. 検証者側の画面 -->
        <div class="card">
            <h2>② 検証者（メディア・調査機関）</h2>
            
            <label>届いたデータ </label>
            <label style="font-weight: normal; margin-top: 5px;">【告発文】</label>
            <input type="text" id="received-report" readonly value="なし">

            <label style="font-weight: normal; margin-top: 5px;">【ZKP証明書 】</label>
            <input type="text" id="received-proof" readonly value="なし">

            <div id="status" class="status-box"></div>

            <label>検証サーバーログ:</label>
            <div id="verifier-console" class="console">データ受信待ち...</div>
        </div>
    </div>

    <script>
        // かなり簡略化したPoseidonライクなハッシュ関数（シミュレート用）
        function simpleHash(val1, val2) {
            let sum = 0;
            const str = val1 + val2;
            for (let i = 0; i < str.length; i++) {
                sum += str.charCodeAt(i) * (i + 1);
            }
            return (sum % 999331).toString(16); // 簡易的なハッシュ値（16進数）
        }

        // 会社が公開している「正しい社員リスト（ハッシュ）」
        // 社員ID「ID_12345」と 秘密鍵「PASS_SECRET_999」から作られるハッシュがあらかじめ登録されているとします
        const EXPECTED_HASH = simpleHash("26P5009", "yoyo66ak");

        function generateProofAndSend() {
            const idInput = document.getElementById("id").value;
            const keyInput = document.getElementById("key").value;
            const reportText = document.getElementById("report").value;
            
            const senderConsole = document.getElementById("sender-console");
            const verifierConsole = document.getElementById("verifier-console");
            const receivedReport = document.getElementById("received-report");
            const receivedProof = document.getElementById("received-proof");
            const statusBox = document.getElementById("status");

            senderConsole.innerHTML = "• マークルツリーのルートを取得しました...<br>";
            
            // 1. ローカルでハッシュを計算
            const myHash = simpleHash(idInput, keyInput);
            senderConsole.innerHTML += "• 秘密情報をハッシュ化しました。<br>";

            // 2. 秘密を一切含まない一時的な「証明書（Proof）」を生成
            // 本来はZKPライブラリ(SnarkJSなど)が数学的な証明データを作りますが、ここではそのフローを擬似的に表現
            const proofData = "ZKP_PROOF_" + btoa(myHash); // 秘密を難読化した擬似証明書
            
            senderConsole.innerHTML += "• ゼロ知識証明(Proof)の作成に成功！<br>• 秘密情報を消去し、証明書のみを送信中...";

            // 3. 検証者へ送信（秘密情報[idInput, keyInput]は送信しない！）
            setTimeout(() => {
                receivedReport.value = reportText;
                receivedProof.value = proofData.substring(0, 20) + "...(暗号データ)";
                
                verifierConsole.innerHTML = "• 告発文とZKP証明書を受信しました。<br>";
                verifierConsole.innerHTML += "• 検証プロセスを開始... (秘密情報は受信していません)<br>";

                // 4. 検証（届いた証明が、登録されている公開ハッシュと一致するか検証）
                const decodedHash = atob(proofData.replace("ZKP_PROOF_", ""));
                
                if (decodedHash === EXPECTED_HASH) {
                    verifierConsole.innerHTML += "• [検証成功] 証明書が社員ハッシュツリーと一致しました！<br>";
                    statusBox.style.display = "block";
                    statusBox.className = "status-box success";
                    statusBox.innerHTML = "🎉 検証成功：本物の現役社員からの告発です！";
                } else {
                    verifierConsole.innerHTML += "• [検証失敗] 正しい社員キーから生成された証明ではありません。<br>";
                    statusBox.style.display = "block";
                    statusBox.className = "status-box danger";
                    statusBox.innerHTML = "❌ 検証失敗：関係者ではないか、無効な鍵です。";
                }
            }, 800);
        }
    </script>
</body>
</html>
